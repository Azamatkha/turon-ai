# Uchta xizmatni birga boshqaradi: vector baza (qdrant) + backend (fastapi+ocr) + frontend (react).
# Ishga tushirish:  docker compose up --build
# Hech narsa o'rnatish SHART EMAS — har bir xizmat o'z konteynerida hammasini o'rnatadi.

services:
  # ---- Vector baza (alohida xizmat) ----
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"        # REST/gRPC port (brauzerda http://localhost:6333/dashboard)
    volumes:
      - ./qdrant_data:/qdrant/storage   # ma'lumot kompyuterda saqlanadi (o'chmaydi)

  # ---- Backend (FastAPI + OCR) ----
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant   # backend qdrant'ni shu nom orqali topadi (docker tarmog'i)
      - QDRANT_PORT=6333
    volumes:
      - ./backend:/app       # kodni o'zgartirsang qayta build shart emas
      - hf_models:/models    # bge-m3 modeli BIR MARTA yuklanadi, keyin shu yerdan o'qiladi
    depends_on:
      - qdrant

  # ---- Frontend (React + Vite) ----
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"          # brauzerda http://localhost:5173
    volumes:
      - ./frontend:/app      # kodni o'zgartirsang darrov ko'rinadi (hot-reload)
      - /app/node_modules    # node_modules konteyner ichida qoladi (host bilan almashmaydi)
    # backendga ulanish hozircha shart emas — mustaqil ishlaydi

# Nomli volume: yuklab olingan AI modeli (~2.3 GB) container o'chsa ham saqlanadi
volumes:
  hf_models: